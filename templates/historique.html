<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Historique</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #f4f7f5;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: #2e7d32;
    }

    .stats {
        display: flex;
        justify-content: space-around;
        margin: 20px 0;
        gap: 10px;
    }

    .stat-card {
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        text-align: center;
        flex: 1;
    }

    .stat-card h2 {
        margin: 0;
        color: #2e7d32;
    }

    .container {
        max-width: 600px;
        margin: auto;
    }

    .card {
        background: white;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
        animation: fadeIn 0.4s ease;
    }

    .info {
        display: flex;
        flex-direction: column;
    }

    .points {
        color: #2e7d32;
        font-weight: bold;
    }

    button {
        background: #e53935;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #c62828;
    }

    a {
        display: block;
        text-align: center;
        margin-top: 20px;
        text-decoration: none;
        color: #2e7d32;
        font-weight: bold;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .empty {
        text-align: center;
        color: #888;
        margin-top: 40px;
    }
</style>
</head>

<body>

<h1>📜 Historique</h1>

<div class="stats">
    <div class="stat-card">
        <h2>{{ total_actions }}</h2>
        <p>Actions</p>
    </div>
    <div class="stat-card">
        <h2>{{ total_points }}</h2>
        <p>Points</p>
    </div>
</div>

<div class="container">

{% if historiques %}
    {% for h in historiques %}
    <div class="card" id="card-{{ h.id }}">
        <div class="info">
            <strong>{{ h.name }}</strong>
            <span class="points">+{{ h.points }} pts</span>
        </div>

     <form method="POST"
      action="{{ url_for('delete_historique', hist_id=h.id) }}"
      onsubmit="confirmDelete(event, {{ h.id }})">
      
       <button type="submit">🗑</button>
     </form>
    </div>
    {% endfor %}
{% else %}
    <p class="empty">Aucune action pour le moment 🌱</p>
{% endif %}

</div>

<a href="{{ url_for('actions_page') }}">⬅ Retour</a>

<script>
function confirmDelete(event, id) {
    event.preventDefault();

    if (confirm("Supprimer cette action ?")) {
        const card = document.getElementById("card-" + id);

        // animation disparition
        card.style.transition = "0.3s";
        card.style.opacity = "0";
        card.style.transform = "translateX(50px)";

        setTimeout(() => {
            event.target.submit();
        }, 300);
    }
}
</script>

</body>
</html>
